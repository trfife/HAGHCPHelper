---
name: "GitHub Copilot CLI"
version: "3.0.5"
slug: copilot_cli
description: >-
  Run GitHub Copilot's AI coding agent directly in your Home Assistant
  sidebar. Edit configs, create automations, debug issues, and control
  your smart home with an agentic AI assistant.
url: "https://github.com/trfife/HAGHCPHelper"
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 7681
ingress_stream: true
panel_icon: mdi:github
panel_title: "Copilot CLI"
homeassistant_api: true
hassio_api: true
hassio_role: manager
map:
  - homeassistant_config:rw
  - addon_config:rw
  - share:rw
  - ssl:ro
  - media:ro
options:
  github_token: ""
  model: "gpt-5-mini"
  session_name: "copilot"
  tmux_history_limit: 50000
  auto_approve: false
  enable_ha_mcp: true
  terminal_font_size: 14
  session_persistence: true
  auto_update: true
  nodered_host: ""
  nodered_port: 22
  nodered_user: "root"
  nodered_path: "/data"
  enable_conversation_agent: true
schema:
  github_token: "password?"
  model: "list(default|gpt-5-mini|gpt-4.1|gpt-5.4-mini|claude-haiku-4.5|gpt-5.1|gpt-5.2|gpt-5.4|gpt-5.2-codex|gpt-5.3-codex|claude-sonnet-4|claude-sonnet-4.5|claude-sonnet-4.6|claude-opus-4.5|claude-opus-4.6)"
  session_name: "str"
  tmux_history_limit: "int"
  auto_approve: "bool"
  enable_ha_mcp: "bool"
  terminal_font_size: "int(10,24)"
  session_persistence: "bool"
  auto_update: "bool"
  nodered_host: "str?"
  nodered_port: "int(1,65535)?"
  nodered_user: "str?"
  nodered_path: "str?"
  enable_conversation_agent: "bool"
environment:
  TERM: xterm-256color
